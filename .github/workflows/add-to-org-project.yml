name: Add to BTL Development

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/breakingthelines/projects/4
          github-token: ${{ secrets.BTL_PROJECT_TOKEN }}
