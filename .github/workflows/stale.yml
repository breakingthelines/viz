name: Stale issues

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days.
            It will be closed in 14 days unless there is new activity.
            Remove the `stale` label or comment to keep it open.
          close-issue-message: >
            Closed due to inactivity. Reopen if still relevant.
          exempt-issue-labels: "pinned,P0 — Critical,P1 — High"
          exempt-all-milestones: true
          operations-per-run: 100
